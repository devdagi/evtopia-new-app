name: Build iOS IPA

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Clean Project
        run: flutter clean

      - name: Get Dependencies
        run: flutter pub get

      - name: Precache iOS
        run: flutter precache --ios

      - name: Remove Pods
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          cd ..

      - name: Install Pods
        run: |
          cd ios
          pod install
          cd ..

      - name: Build iOS (no signing)
        run: flutter build ios --release --no-codesign

      - name: Build IPA (no signing)
        run: flutter build ipa --no-codesign