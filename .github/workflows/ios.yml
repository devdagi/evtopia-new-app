name: Build iOS IPA

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Clean
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Precache iOS
        run: flutter precache --ios

      - name: Remove Pods
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          cd ..

      - name: Install Pods
        run: |
          cd ios
          pod install
          cd ..

      - name: Build iOS (generate files)
        run: flutter build ios --release

      - name: Build IPA
        run: flutter build ipa --no-codesign