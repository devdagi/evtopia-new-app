workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods

    scripts:
      - name: Clean environment (IMPORTANT FIX)
        script: |
          flutter clean
          rm -rf ~/.pub-cache/hosted/pub.dev/wakelock_plus-*
          flutter pub get

      - name: Install iOS dependencies
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..

      - name: Build IPA
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - dagmawinegatu7@gmail.com