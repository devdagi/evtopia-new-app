workflows:
  ios-workflow:
    name: iOS TestFlight Build

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Clean Flutter
        script: flutter clean

      - name: Get packages
        script: flutter pub get

      - name: Fix CocoaPods
        script: |
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          pod repo update
          pod install --repo-update

      - name: Build IPA
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true