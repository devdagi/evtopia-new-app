workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Fix CocoaPods (IMPORTANT)
        script: |
          cd ios
          rm -rf Podfile.lock Pods
          pod repo update
          pod install --repo-update
          cd ..

      - name: Build iOS (no signing)
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - dagmawinegatu7@gmail.com